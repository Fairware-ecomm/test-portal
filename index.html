<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BC Transit Merchandise Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      color: #1f2933;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 760px;
      margin: 80px auto;
      padding: 40px 24px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 12px;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .button {
      display: block;
      max-width: 360px;
      margin: 16px auto;
      padding: 18px 24px;
      background: #005daa;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 18px;
    }

    .button.secondary {
      background: #2f855a;
    }

    .note {
      font-size: 14px;
      color: #637381;
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>BC Transit Merchandise Portal</h1>
    <p>Please select the option that best describes your ordering needs.</p>

    <a class="button" href="https://fairwarestore.myshopify.com/collections/bc-transit-collection">
      BC Transit Employee Store
    </a>

    <a class="button secondary" href="https://fairware.commonsku.com/shop/090411b9-0e88-41b9-9049-7c1d919cecee">
      Local Government Partner Store
    </a>

    <p class="note">
      For questions about merchandise ordering, please contact Fairware.
    </p>
  </main>
</body>
</html>
